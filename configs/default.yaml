dataset: mvtec
shot: 1
image_size: 448
batch_size: 1
seed: 42

backbone:
  vision_encoder: dinov2_vitg14
  text_encoder: clip_l14_336
  frozen: true

paths:
  data_root: data/
  results_root: results/
  pretrained_ckpts: pretrained_ckpts/
  masks_root: masks/
  heat_masks_root: heat_masks/

evaluation:
  metrics: [image_auroc, pixel_auroc, pro]
  # pro is meaningful only for mvtec_loco — enforced in test_univad.py

device: cuda
num_workers: 4
use_crf: true
